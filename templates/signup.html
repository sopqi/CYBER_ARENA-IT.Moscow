{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center reveal">
    <div class="col-md-6 col-lg-5">
        <div class="glass-panel p-5" style="border-top: 2px solid var(--cyber-purple);">
            <h2 class="text-center orbitron mb-4" style="color: #fff; text-shadow: 0 0 15px var(--cyber-purple);">РЕГИСТРАЦИЯ ИГРОКА</h2>
            <form method="post" id="signupForm">
                {% csrf_token %}
                {% for field in form %}
                <div class="mb-4">
                    <label class="form-label text-muted orbitron" style="font-size: 0.7rem;">{{ field.label }}</label>
                    <div class="position-relative">
                        {{ field }}
                    </div>
                    {% if field.errors %}
                        <div class="text-danger mt-1" style="font-size: 0.8rem; font-family: 'Orbitron', sans-serif;">{{ field.errors.0 }}</div>
                    {% endif %}
                </div>
                {% endfor %}
                <button type="submit" class="btn-premium w-100 mt-2 py-3 border-0">ПОДТВЕРДИТЬ</button>
            </form>
            <div class="text-center mt-4">
                <a href="{% url 'login' %}" class="text-muted text-decoration-none" style="font-size: 0.8rem; font-family: 'Orbitron', sans-serif; transition: color 0.3s;" onmouseover="this.style.color='var(--cyber-blue)'" onmouseout="this.style.color='var(--text-muted)'">УЖЕ В СИСТЕМЕ? АВТОРИЗОВАТЬСЯ</a>
            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        try {
            // Стилизация полей Django
            const inputs = document.querySelectorAll('input, select');
            inputs.forEach(el => {
                el.style.backgroundColor = 'rgba(0,0,0,0.5)';
                el.style.border = '1px solid #333';
                el.style.color = '#fff';
                el.style.padding = '12px';
                el.style.borderRadius = '8px';
                el.style.transition = 'border-color 0.3s, box-shadow 0.3s';
                el.addEventListener('focus', () => {
                    el.style.borderColor = 'var(--cyber-purple)';
                    el.style.boxShadow = '0 0 15px rgba(176,38,255,0.2)';
                    el.style.outline = 'none';
                });
                el.addEventListener('blur', () => {
                    el.style.borderColor = '#333';
                    el.style.boxShadow = 'none';
                });
            });

            // Настройка поиска групп (Select2)
            if(typeof jQuery !== 'undefined' && $.fn.select2) {
                const groupSelect = $('select[name="group_number"]');
                groupSelect.select2({
                    width: '100%',
                    placeholder: "Ожидание выбора корпуса...",
                    dropdownCssClass: 'glass-panel',
                    selectionCssClass: 'glass-panel'
                });

                // AJAX запрос в API
                $('select[name="campus"]').on('change', function() {
                    const c = $(this).val();
                    if(!c) return;
                    groupSelect.empty().prop('disabled', true);
                    fetch(`/api/get-groups/?campus=${c}`)
                        .then(r => r.json())
                        .then(d => {
                            groupSelect.empty();
                            if(d.groups && d.groups.length) {
                                groupSelect.append(new Option("Введите название...", "", false, false));
                                d.groups.forEach(g => groupSelect.append(new Option(g, g)));
                                groupSelect.prop('disabled', false);
                            } else {
                                groupSelect.append(new Option("Группы не найдены", "", false, false));
                            }
                            groupSelect.trigger('change');
                        });
                });
                if($('select[name="campus"]').val()) $('select[name="campus"]').trigger('change');
            }
        } catch(e) {}
    });
</script>
{% endblock %}
