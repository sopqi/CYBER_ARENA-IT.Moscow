{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="cyber-card p-4 p-md-5">
            <h2 class="text-center text-info mb-4">🔧 СОЗДАНИЕ ТУРНИРА</h2>
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}
                
                {% for field in form %}
                <div class="mb-3">
                    <label class="form-label text-secondary small fw-bold">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}<div class="text-danger small mt-1">{{ field.errors.0 }}</div>{% endif %}
                </div>
                {% endfor %}

                <button type="submit" class="btn btn-neon-blue w-100 mt-4 fw-bold">ЗАПУСТИТЬ ТУРНИР</button>
            </form>
        </div>
    </div>
</div>

<script>
    document.querySelectorAll('input, select, textarea').forEach(el => {
        el.classList.add('form-control', 'bg-dark', 'text-white', 'border-secondary');
    });
</script>
{% endblock %}
